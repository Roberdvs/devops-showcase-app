application:
  deployment:
    image:
      repository: ghcr.io/roberdvs/devops-showcase-app
      tag: v0.5.0
    env:
      DB_HOST:
        value: postgresql
      DB_PORT:
        value: "5432"
      DB_USER:
        value: postgres
      DB_PASSWORD:
        value: postgres
      DB_NAME:
        value: example
    initContainers:
      wait-for-database:
        image: postgres:18-alpine
        env:
          - name: DB_HOST
            value: postgresql
        command: ['sh', '-c', 'until pg_isready -h $DB_HOST -p 5432 -U dummy; do echo waiting for database; sleep 2; done;']
    ports:
      - containerPort: 8000
        name: http
        protocol: TCP

    startupProbe:
      enabled: true
      httpGet:
        path: /health/ready
        port: 8000
      initialDelaySeconds: 15
      timeoutSeconds: 5
      failureThreshold: 3
      successThreshold: 1
      periodSeconds: 10
    readinessProbe:
      enabled: true
      httpGet:
        path: /health/ready
        port: 8000
      initialDelaySeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3
      successThreshold: 1
      periodSeconds: 5
    livenessProbe:
      enabled: true
      httpGet:
        path: /health/live
        port: 8000
      initialDelaySeconds: 30
      timeoutSeconds: 5
      failureThreshold: 3
      successThreshold: 1
      periodSeconds: 10

  service:
    type: ClusterIP
    ports:
    - port: 8000
      name: http
      protocol: TCP
      targetPort: 8000

postgresql:
  # In-cluster PostgreSQL for CI/local only (disable when using e.g. AWS RDS).
  # Storage is left unset, so the chart uses an ephemeral emptyDir.
  enabled: true
  fullnameOverride: postgresql
  settings:
    superuser:
      value: postgres
    superuserPassword:
      value: postgres
  # Create the app database; the app connects as the superuser.
  env:
    - name: POSTGRES_DB
      value: example
